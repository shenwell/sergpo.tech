# Публикация только через этот workflow (Settings → Pages → Source: GitHub Actions).
# Если включить ещё и «Deploy from a branch», GitHub запустит Jekyll по репозиторию — это другой, лишний пайплайн.
name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Pin Go for runners: go.mod previously used 1.26.x which setup-go often cannot resolve on ubuntu-latest
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"

      - name: Install Hugo Extended
        run: |
          set -euo pipefail
          wget -nv -O "${RUNNER_TEMP}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo apt-get update -qq
          sudo apt-get install -y "${RUNNER_TEMP}/hugo.deb"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Download Hugo modules
        run: hugo mod download

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --gc --minify --baseURL "https://sergpo.tech/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
